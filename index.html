<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>

  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/string-lights.css" />
</head>
<body>

  <div class="string-lights-wrap" aria-hidden="true">
    <div class="string-lights-stack">
      <img
        src="assets/images/background/string-light-base.png"
        alt=""
        class="string-lights"
      />

      <img
        src="assets/images/masks/string-lights/string-light-mask1.png"
        alt=""
        class="string-light-mask mask-1"
      />
      <img
        src="assets/images/masks/string-lights/string-light-mask2.png"
        alt=""
        class="string-light-mask mask-2"
      />
      <img
        src="assets/images/masks/string-lights/string-light-mask3.png"
        alt=""
        class="string-light-mask mask-3"
      />
      <img
        src="assets/images/masks/string-lights/string-light-mask4.png"
        alt=""
        class="string-light-mask mask-4"
      />
      <img
        src="assets/images/masks/string-lights/string-light-mask5.png"
        alt=""
        class="string-light-mask mask-5"
      />
      <img
        src="assets/images/masks/string-lights/string-light-mask6.png"
        alt=""
        class="string-light-mask mask-6"
      />
      <img
        src="assets/images/masks/string-lights/string-light-mask7.png"
        alt=""
        class="string-light-mask mask-7"
      />
    </div>
  </div>

  <img
    src="assets/images/background/menu-button.png"
    alt="Open menu"
    class="menu-button"
    id="menuButton"
    role="button"
    tabindex="0"
  />

  <main class="home-page"></main>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const menuButton = document.getElementById("menuButton");

      if (menuButton) {
        menuButton.addEventListener("click", function () {
          console.log("Menu clicked");
        });

        menuButton.addEventListener("keydown", function (event) {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            menuButton.click();
          }
        });
      }

      const masks = [
        document.querySelector(".mask-1"),
        document.querySelector(".mask-2"),
        document.querySelector(".mask-3"),
        document.querySelector(".mask-4"),
        document.querySelector(".mask-5"),
        document.querySelector(".mask-6"),
        document.querySelector(".mask-7")
      ].filter(Boolean);

      if (masks.length !== 7) {
        console.error("Not all string light masks were found.");
        return;
      }

      function randomRange(min, max) {
        return min + Math.random() * (max - min);
      }

      const lights = masks.map(function (element, index) {
        return {
          element: element,
          base: randomRange(0.35, 0.55),

          amp1: randomRange(0.10, 0.18),
          speed1: randomRange(0.00035, 0.0007),
          phase1: randomRange(0, Math.PI * 2),

          amp2: randomRange(0.03, 0.07),
          speed2: randomRange(0.0009, 0.0015),
          phase2: randomRange(0, Math.PI * 2),

          shimmerAmp: randomRange(0.01, 0.025),
          shimmerSpeed: randomRange(0.002, 0.004),
          shimmerPhase: randomRange(0, Math.PI * 2),

          glowBase: randomRange(0.85, 1.1),
          glowAmp: randomRange(0.15, 0.35),

          offset: index * 0.23
        };
      });

      function animate(now) {
        for (let i = 0; i < lights.length; i++) {
          const light = lights[i];

          const t1 = now * light.speed1 + light.phase1 + light.offset;
          const t2 = now * light.speed2 + light.phase2 + light.offset;
          const t3 = now * light.shimmerSpeed + light.shimmerPhase + light.offset;

          const wave1 = Math.sin(t1);
          const wave2 = Math.sin(t2);
          const shimmer = Math.sin(t3);

          let opacity =
            light.base +
            wave1 * light.amp1 +
            wave2 * light.amp2 +
            shimmer * light.shimmerAmp;

          if (opacity < 0.18) opacity = 0.18;
          if (opacity > 0.95) opacity = 0.95;

          const glowStrength = light.glowBase + ((wave1 + 1) * 0.5) * light.glowAmp;
          const nearGlow = (2.5 + glowStrength * 1.5).toFixed(2);
          const midGlow = (6 + glowStrength * 3).toFixed(2);
          const farGlow = (12 + glowStrength * 6).toFixed(2);
          const brightness = (1.05 + glowStrength * 0.18).toFixed(2);

          light.element.style.opacity = opacity.toFixed(3);
          light.element.style.filter =
            "brightness(" + brightness + ") " +
            "drop-shadow(0 0 " + nearGlow + "px rgba(255,255,255,0.95)) " +
            "drop-shadow(0 0 " + midGlow + "px rgba(255,255,255,0.55)) " +
            "drop-shadow(0 0 " + farGlow + "px rgba(255,255,255,0.28))";
        }

        requestAnimationFrame(animate);
      }

      requestAnimationFrame(animate);
    });
  </script>

</body>
</html>
