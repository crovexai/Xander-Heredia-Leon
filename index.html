<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generate Xander Photoshoot</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div id="menu-btn">
    <button class="menu-btn" aria-label="Open menu" type="button">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <nav id="sidebar" aria-label="Sidebar navigation">
    <a href="index.html" class="active">Home</a>
    <a href="ai.html">AI Generator</a>
    <a href="links.html">Links</a>
    <a href="bio.html">Bio</a>
    <a href="contact.html">Contact</a>
    <a href="admin-login.html">Admin Login</a>
  </nav>

  <div class="render-status">Render #5 Live</div>

  <main class="page-shell page-spacer">
    <img
      class="top-lights"
      src="assets/images/background/string-lights-base.png"
      alt="String Lights"
    />

    <section class="container">
      <h1 class="page-title">Generate a Xander Photoshoot</h1>
      <p class="page-subtitle">
        Pick a preset, describe the look, and generate a styled concept image.
      </p>

      <select id="preset">
        <option value="studio">Studio Photoshoot</option>
        <option value="beach">Beach Photoshoot</option>
        <option value="gym">Gym Fitness Shoot</option>
      </select>

      <input
        id="prompt"
        type="text"
        placeholder="Example: black fitted shirt, luxury watch, moody editorial lighting"
      />

      <button id="generate-btn" type="button">Generate</button>

      <div id="result"></div>
    </section>
  </main>

  <script src="assets/js/script.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
