<!DOCTYPE html>
<html lang="en">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>

  <link rel="stylesheet" href="assets/css/style.css?v=12" />

</head>
<body>

  <!-- String lights system -->
  <div class="string-lights-wrap" aria-hidden="true">
    <img
      src="assets/images/background/string-light-base.png"
      alt=""
      class="string-lights"
    />

    <img
      src="assets/images/masks/string-lights/string-light-mask1.png"
