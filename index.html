<script>
  const menuButton = document.getElementById("menuButton");

  menuButton.addEventListener("click", () => {
    console.log("Menu clicked");
  });

  menuButton.addEventListener("keydown", (event) => {
    if (event.key === "Enter" || event.key === " ") {
      event.preventDefault();
      menuButton.click();
    }
  });

  const masks = [
    document.querySelector(".mask-1"),
    document.querySelector(".mask-2"),
    document.querySelector(".mask-3"),
    document.querySelector(".mask-4"),
    document.querySelector(".mask-5"),
    document.querySelector(".mask-6"),
    document.querySelector(".mask-7")
  ];

  let active = new Set();

  function initLights() {
    while (active.size < 3) {
      active.add(Math.floor(Math.random() * 7));
    }
    renderLights();
    scheduleNextTick();
  }

  function renderLights() {
    for (let i = 0; i < masks.length; i++) {
      if (active.has(i)) {
        masks[i].classList.add("on");
      } else {
        masks[i].classList.remove("on");
      }
    }
  }

  function tickLights() {
    const activeArray = Array.from(active);
    const removeIndex = activeArray[Math.floor(Math.random() * activeArray.length)];
    active.delete(removeIndex);

    let newIndex;
    do {
      newIndex = Math.floor(Math.random() * 7);
    } while (active.has(newIndex));

    active.add(newIndex);
    renderLights();
    scheduleNextTick();
  }

  function scheduleNextTick() {
    setTimeout(tickLights, 220);
  }

  initLights();
</script>
