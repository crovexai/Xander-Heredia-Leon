<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>

  <!-- Main styles -->
  <link rel="stylesheet" href="assets/css/style.css?v=10" />

  <!-- String lights system -->
  <link rel="stylesheet" href="assets/css/string-lights.css?v=1" />
</head>
<body>

  <!-- String lights with mask -->
  <img
    src="assets/images/background/string-light-base.png"
    alt=""
    class="string-lights mask-1"
    aria-hidden="true"
  />

  <!-- Menu button -->
  <img
    src="assets/images/background/menu-button.png"
    alt="Open menu"
    class="menu-button"
    id="menuButton"
    role="button"
    tabindex="0"
  />

  <!-- Main content -->
  <main class="home-page"></main>

  <script>
    const menuButton = document.getElementById("menuButton");

    menuButton.addEventListener("click", () => {
      console.log("Menu clicked");
    });

    menuButton.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        menuButton.click();
      }
    });
  </script>

</body>
</html>
