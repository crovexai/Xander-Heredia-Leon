<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>

  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/string-lights.css" />
</head>
<body>

  <div class="string-lights-wrap" aria-hidden="true">
    <div class="string-lights-stack" id="stringLightsStack">
      <div class="lights-ambient"></div>

      <img
        src="assets/images/background/string-light-base.png"
        alt=""
        class="string-lights"
      />

      <img
        src="assets/images/masks/string-lights/string-light-mask1.png"
        alt=""
        class="string-light-mask mask-1"
      />
      <img
        src="assets/images/masks/string-lights/string-light-mask2.png"
        alt=""
        class="string-light-mask mask-2"
      />
      <img
        src="assets/images/masks/string-lights/string-light-mask3.png"
        alt=""
        class="string-light-mask mask-3"
      />
      <img
        src="assets/images/masks/string-lights/string-light-mask4.png"
        alt=""
        class="string-light-mask mask-4"
      />
      <img
        src="assets/images/masks/string-lights/string-light-mask5.png"
        alt=""
        class="string-light-mask mask-5"
      />
      <img
        src="assets/images/masks/string-lights/string-light-mask6.png"
        alt=""
        class="string-light-mask mask-6"
      />
      <img
        src="assets/images/masks/string-lights/string-light-mask7.png"
        alt=""
        class="string-light-mask mask-7"
      />
    </div>
  </div>

  <img
    src="assets/images/background/menu-button.png"
    alt="Open menu"
    class="menu-button"
    id="menuButton"
    role="button"
    tabindex="0"
  />

  <main class="home-page"></main>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const menuButton = document.getElementById("menuButton");
      const stack = document.getElementById("stringLightsStack");

      if (menuButton) {
        menuButton.addEventListener("click", function () {
          console.log("Menu clicked");
        });

        menuButton.addEventListener("keydown", function (event) {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            menuButton.click();
          }
        });
      }

      const masks = [
        document.querySelector(".mask-1"),
        document.querySelector(".mask-2"),
        document.querySelector(".mask-3"),
        document.querySelector(".mask-4"),
        document.querySelector(".mask-5"),
        document.querySelector(".mask-6"),
        document.querySelector(".mask-7")
      ].filter(Boolean);

      if (!stack || masks.length !== 7) {
        console.error("String lights could not initialize.");
        return;
      }

      /*
        IMPORTANT:
        These positions are percentages of the base image area.
        Adjust them slightly if one glow is not centered perfectly over its bulb.
      */
      const bulbPositions = [
        { x: 8.3,  y: 33.5 },
        { x: 21.8, y: 27.8 },
        { x: 35.5, y: 34.0 },
        { x: 49.7, y: 28.6 },
        { x: 63.6, y: 35.0 },
        { x: 77.8, y: 28.8 },
        { x: 91.2, y: 34.1 }
      ];

      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const glowNodes = bulbPositions.map(function (pos, index) {
        const glow = document.createElement("div");
        glow.className = "light-glow glow-" + (index + 1);
        glow.style.left = pos.x + "%";
        glow.style.top = pos.y + "%";
        stack.appendChild(glow);
        return glow;
      });

      function randomRange(min, max) {
        return min + Math.random() * (max - min);
      }

      const profileTypes = [
        "steady",
        "soft",
        "soft",
        "gentle",
        "steady",
        "soft",
        "alive"
      ];

      const lights = masks.map(function (mask, index) {
        const type = profileTypes[index] || "soft";

        let base;
        let amp1;
        let amp2;
        let speed1;
        let speed2;
        let microAmp;
        let microSpeed;
        let pulseChance;

        if (type === "steady") {
          base = randomRange(0.64, 0.76);
          amp1 = randomRange(0.015, 0.035);
          amp2 = randomRange(0.008, 0.020);
          speed1 = randomRange(0.55, 0.90);
          speed2 = randomRange(1.05, 1.50);
          microAmp = randomRange(0.004, 0.010);
          microSpeed = randomRange(2.20, 3.20);
          pulseChance = 0.0010;
        } else if (type === "gentle") {
          base = randomRange(0.56, 0.70);
          amp1 = randomRange(0.025, 0.050);
          amp2 = randomRange(0.015, 0.030);
          speed1 = randomRange(0.75, 1.10);
          speed2 = randomRange(1.30, 1.90);
          microAmp = randomRange(0.008, 0.015);
          microSpeed = randomRange(2.80, 3.80);
          pulseChance = 0.0018;
        } else if (type === "alive") {
          base = randomRange(0.54, 0.68);
          amp1 = randomRange(0.030, 0.060);
          amp2 = randomRange(0.018, 0.040);
          speed1 = randomRange(0.90, 1.25);
          speed2 = randomRange(1.60, 2.20);
          microAmp = randomRange(0.010, 0.020);
          microSpeed = randomRange(3.20, 4.40);
          pulseChance = 0.0030;
        } else {
          base = randomRange(0.58, 0.72);
          amp1 = randomRange(0.020, 0.045);
          amp2 = randomRange(0.012, 0.028);
          speed1 = randomRange(0.70, 1.00);
          speed2 = randomRange(1.20, 1.70);
          microAmp = randomRange(0.006, 0.014);
          microSpeed = randomRange(2.60, 3.60);
          pulseChance = 0.0015;
        }

        return {
          mask: mask,
          glow: glowNodes[index],
          base: base,
          amp1: amp1,
          amp2: amp2,
          speed1: speed1,
          speed2: speed2,
          microAmp: microAmp,
          microSpeed: microSpeed,
          phase1: randomRange(0, Math.PI * 2),
          phase2: randomRange(0, Math.PI * 2),
          microPhase: randomRange(0, Math.PI * 2),
          offset: index * 0.37,
          pulseChance: pulseChance,
          pulseStrength: 0,
          pulseDecay: randomRange(0.84, 0.92)
        };
      });

      function setLightVisual(light, intensity) {
        /*
          Clamp to realistic incandescent range.
          Avoid harsh full-off or full-on states.
        */
        if (intensity < 0.18) intensity = 0.18;
        if (intensity > 0.92) intensity = 0.92;

        const glowOpacity = Math.min(0.98, intensity * 1.02);
        const glowScale = 0.92 + intensity * 0.20;

        light.mask.style.setProperty("--intensity", intensity.toFixed(3));
        light.glow.style.setProperty("--intensity", glowOpacity.toFixed(3));
        light.glow.style.setProperty("--scale", glowScale.toFixed(3));
      }

      function animateLights(timeSeconds) {
        for (let i = 0; i < lights.length; i++) {
          const light = lights[i];

          const slowWave =
            Math.sin((timeSeconds * light.speed1) + light.phase1 + light.offset);

          const midWave =
            Math.sin((timeSeconds * light.speed2) + light.phase2 + light.offset);

          const microWave =
            Math.sin((timeSeconds * light.microSpeed) + light.microPhase + light.offset);

          if (Math.random() < light.pulseChance) {
            light.pulseStrength = randomRange(0.020, 0.060);
          }

          light.pulseStrength *= light.pulseDecay;

          let intensity =
            light.base +
            (slowWave * light.amp1) +
            (midWave * light.amp2) +
            (microWave * light.microAmp) -
            light.pulseStrength;

          setLightVisual(light, intensity);
        }
      }

      if (prefersReducedMotion) {
        lights.forEach(function (light) {
          setLightVisual(light, light.base);
        });
        return;
      }

      /*
        Cap updates to ~24 FPS.
        This is a major performance win over doing heavy visual work
        at every available animation frame.
      */
      let lastTime = 0;
      const frameInterval = 1000 / 24;

      function loop(now) {
        if (!lastTime || now - lastTime >= frameInterval) {
          lastTime = now;
          animateLights(now / 1000);
        }
        requestAnimationFrame(loop);
      }

      /*
        Set initial state immediately so there is no flash/jump on load.
      */
      lights.forEach(function (light) {
        setLightVisual(light, light.base);
      });

      requestAnimationFrame(loop);
    });
  </script>

</body>
</html>

</body>
</html>
