<script>
  const menuButton = document.getElementById("menuButton");

  menuButton.addEventListener("click", () => {
    console.log("Menu clicked");
  });

  menuButton.addEventListener("keydown", (event) => {
    if (event.key === "Enter" || event.key === " ") {
      event.preventDefault();
      menuButton.click();
    }
  });

  /* =========================
     RANDOM 3 MASK SYSTEM
  ========================= */

  const masks = [
    document.querySelector(".mask-1"),
    document.querySelector(".mask-2"),
    document.querySelector(".mask-3"),
    document.querySelector(".mask-4"),
    document.querySelector(".mask-5"),
    document.querySelector(".mask-6"),
    document.querySelector(".mask-7"),
  ];

  function getRandomThree() {
    const indices = [0,1,2,3,4,5,6];

    // Fisher–Yates shuffle (correct random)
    for (let i = indices.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [indices[i], indices[j]] = [indices[j], indices[i]];
    }

    return indices.slice(0, 3);
  }

  function updateMasks() {
    const selected = getRandomThree();

    for (let i = 0; i < masks.length; i++) {
      if (selected.includes(i)) {
        masks[i].classList.add("on");
      } else {
        masks[i].classList.remove("on");
      }
    }
  }

  function tick() {
    updateMasks();
  }

  // initial state
  updateMasks();

  // animation speed (tune this)
  setInterval(tick, 180);
</script>
