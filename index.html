<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>

  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/string-lights.css" />
</head>
<body>

  <!-- STRING LIGHTS -->
  <div class="string-lights-wrap" aria-hidden="true">
    <div class="string-lights-stack">
      
      <img
        src="assets/images/background/string-light-base.png"
        alt=""
        class="string-lights"
      />

      <img
        src="assets/images/masks/string-light/string-light-mask.png"
        alt=""
        class="string-light-mask"
        id="stringLightMask"
      />

      <!-- NAME TAG -->
      <div class="below-lights">
        <div class="name-tag-shell">
          <img
            src="assets/images/background/name-tag.png"
            alt="Xander Heredia-Leon"
            class="name-tag"
            id="nameTag"
          />
        </div>
      </div>

    </div>
  </div>

  <!-- MENU BUTTON -->
  <button class="menu-button" id="menuButton" aria-label="Open menu">
    <img
      src="assets/images/background/menu-button.png"
      alt=""
    />
  </button>

  <!-- MAIN CONTENT -->
  <main class="home-page">
    <!-- You’ll add sections here later -->
  </main>

  <!-- SCRIPT -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const menuButton = document.getElementById("menuButton");
      const mask = document.getElementById("stringLightMask");
      const nameTag = document.getElementById("nameTag");

      /* MENU */
      if (menuButton) {
        menuButton.addEventListener("click", function () {
          console.log("Menu clicked");
        });
      }

      if (!mask) return;

      let currentOpacity = 0.76;
      let targetOpacity = 0.76;
      let nextTargetAt = 0;
      let pulseBoost = 0;
      let lastTime = 0;

      function randomBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function setNextTarget(now) {
        targetOpacity = randomBetween(0.62, 0.99);
        pulseBoost = Math.random() > 0.68 ? randomBetween(0.04, 0.10) : 0;
        nextTargetAt = now + randomBetween(18, 58);
      }

      function animate(now) {
        /* PERFORMANCE THROTTLE */
        if (now - lastTime < 16) {
          requestAnimationFrame(animate);
          return;
        }
        lastTime = now;

        if (now >= nextTargetAt) {
          setNextTarget(now);
        }

        currentOpacity += (targetOpacity - currentOpacity) * 0.24;

        const flicker =
          Math.sin(now * 0.05) * 0.04 +
          Math.sin(now * 0.1) * 0.03 +
          (Math.random() - 0.5) * 0.02;

        let opacity = clamp(currentOpacity + flicker + pulseBoost, 0.56, 1);

        const glowPower = (opacity - 0.56) / 0.44;
        const warmPower = clamp(glowPower, 0, 1);

        const brightness = 1.05 + warmPower * 0.24;
        const blur = 1.6 + warmPower * 1.2;
        const sway = Math.sin(now * 0.003) * (0.25 + warmPower * 0.6);

        mask.style.opacity = opacity.toFixed(3);
        mask.style.transform = `translateX(${sway.toFixed(2)}px)`;
        mask.style.filter = `
          brightness(${brightness.toFixed(3)})
          blur(${blur.toFixed(2)}px)
          drop-shadow(0 0 ${8 + warmPower * 10}px rgba(255, 220, 150, 0.8))
        `;

        /* FLOATING NAME EFFECT */
        if (nameTag) {
          const floatY = Math.sin(now * 0.002) * 3;

          nameTag.style.transform = `
            translateY(${floatY.toFixed(2)}px)
            scale(0.92)
          `;

          nameTag.style.filter = `
            drop-shadow(0 18px 30px rgba(0,0,0,0.35))
            drop-shadow(0 0 ${10 + warmPower * 10}px rgba(255,210,130,0.3))
          `;
        }

        pulseBoost *= 0.9;

        requestAnimationFrame(animate);
      }

      setNextTarget(performance.now());
      requestAnimationFrame(animate);
    });
  </script>

</body>
</html>
