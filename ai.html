<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/script.js" defer></script>
</head>
<body>

  <img src="assets/images/background/grass-wall.png" alt="Grass Wall" style="width:100%;max-width:100vw;display:block;margin:0 auto;image-rendering:auto;">
  <button id="menu-btn" class="menu-btn">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav id="sidebar">
</nav>

  <main class="page-shell page-spacer">
    <section class="container">
      <h1 class="page-title">Generate a Xander Photoshoot</h1>
      <p class="page-subtitle">
        Pick a preset, describe the look, and generate a styled concept image.
      </p>

      <select id="preset">
        <option value="studio">Studio Photoshoot</option>
        <option value="beach">Beach Photoshoot</option>
        <option value="gym">Gym Fitness Shoot</option>
      </select>

      <input
        id="prompt"
        type="text"
        placeholder="Example: black fitted shirt, luxury watch, moody editorial lighting"
      />

      <button id="generate-btn" type="button">Generate</button>

      <div id="result"></div>
    </section>
  </main>
</body>
<script src="assets/js/main.js"></script>
</html>
